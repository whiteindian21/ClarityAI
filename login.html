<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · TextCoach</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            surface: {
              50: '#fafaf9',
              100: '#f5f5f4',
              200: '#e7e5e4',
              300: '#d6d3d1',
              400: '#a8a29e',
              500: '#78716c',
              600: '#57534e',
              700: '#44403c',
              800: '#292524',
              900: '#1c1917',
              950: '#0c0a09',
            },
            accent: {
              DEFAULT: '#f97316',
              light: '#fb923c',
              dark: '#ea580c',
              muted: '#fed7aa',
            },
            success: '#10b981',
            warning: '#f59e0b',
            danger: '#ef4444',
          },
          animation: {
            'fade-in': 'fadeIn 0.5s cubic-bezier(0.16,1,0.3,1)',
            'float': 'float 6s ease-in-out infinite',
            'shake': 'shake 0.4s ease-in-out',
            'spin-slow': 'spin 3s linear infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            float: {
              '0%,100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-6px)' },
            },
            shake: {
              '0%,100%': { transform: 'translateX(0)' },
              '20%,60%': { transform: 'translateX(-5px)' },
              '40%,80%': { transform: 'translateX(5px)' },
            },
          },
        },
      },
    }
  </script>
  <style>
    :root {
      --bg: #0c0a09;
      --bg-elevated: #1c1917;
      --fg: #fafaf9;
      --fg-muted: #a8a29e;
      --accent: #f97316;
      --border: #292524;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }
    .font-display { font-family: 'Space Grotesk', sans-serif; }

    .bg-mesh {
      position: fixed; inset: 0; z-index: -1;
      background: 
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(249,115,22,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(249,115,22,0.08), transparent),
        radial-gradient(ellipse 100% 80% at 50% 50%, rgba(28,25,23,1), transparent);
    }
    .noise-overlay {
      position: fixed; inset: 0; z-index: -1; opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* card floating effect */
    .auth-card {
      animation: fadeIn 0.5s cubic-bezier(0.16,1,0.3,1), float 6s ease-in-out infinite;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .auth-card:hover {
      box-shadow: 0 30px 50px -20px rgba(249,115,22,0.3);
      border-color: rgba(249,115,22,0.3);
    }

    .input-wrapper { position: relative; transition: all 0.2s; }
    .input-wrapper.error input { border-color: #ef4444; background: rgba(239,68,68,0.03); }
    .input-wrapper.success input { border-color: #10b981; }
    .input-wrapper:focus-within input {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.15), 0 0 0 1px var(--accent);
    }

    .btn-primary {
      position: relative; overflow: hidden;
      background: linear-gradient(145deg, #f97316, #ea580c);
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 20px 30px -10px #f97316; }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .tab-indicator { transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }

    .strength-bar { transition: background-color 0.3s; }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* custom checkbox */
    .checkbox-custom {
      appearance: none;
      width: 1.1rem;
      height: 1.1rem;
      border: 1.5px solid #44403c;
      border-radius: 4px;
      background: #1c1917;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .checkbox-custom:checked {
      background: #f97316;
      border-color: #f97316;
    }
    .checkbox-custom:checked::after {
      content: "✓";
      color: white;
      font-size: 0.8rem;
      line-height: 1;
    }
    .checkbox-custom:focus-visible { outline: 2px solid #f97316; outline-offset: 1px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #292524; border-radius: 3px; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="bg-mesh"></div>
  <div class="noise-overlay"></div>

  <!-- Auth Card -->
  <div class="w-full max-w-[420px]">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 group">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent to-accent-dark flex items-center justify-center transition-transform group-hover:scale-110 group-hover:rotate-3 shadow-lg shadow-accent/30">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
        <span class="font-display font-semibold text-xl text-surface-50">TextCoach</span>
      </a>
    </div>

    <!-- Card with floating effect -->
    <div class="auth-card bg-surface-900/80 backdrop-blur-xl border border-surface-800 rounded-2xl overflow-hidden shadow-2xl">
      <!-- Tabs -->
      <div id="auth-tabs" class="relative flex border-b border-surface-800">
        <button id="tab-login" class="flex-1 py-4 text-center font-medium text-surface-50 transition-colors relative z-10" data-tab="login">Login</button>
        <button id="tab-signup" class="flex-1 py-4 text-center font-medium text-surface-400 hover:text-surface-200 transition-colors relative z-10" data-tab="signup">Sign Up</button>
        <div id="tab-indicator" class="tab-indicator absolute bottom-0 left-0 w-1/2 h-0.5 bg-accent"></div>
      </div>

      <!-- Form Container -->
      <div class="p-6 sm:p-8">
        <!-- Global Error Message -->
        <div id="global-error" class="hidden mb-6 p-4 rounded-xl bg-danger/10 border border-danger/20 animate-shake">
          <div class="flex items-start gap-3">
            <svg class="w-5 h-5 text-danger shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <p id="global-error-text" class="text-danger text-sm"></p>
          </div>
        </div>

        <!-- Success Message -->
        <div id="success-message" class="hidden mb-6 p-4 rounded-xl bg-success/10 border border-success/20">
          <div class="flex items-start gap-3">
            <svg class="w-5 h-5 text-success shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <p id="success-message-text" class="text-success text-sm"></p>
          </div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-5">
          <div class="input-wrapper">
            <label for="login-email" class="block text-sm font-medium text-surface-300 mb-2">Email</label>
            <div class="relative">
              <input type="email" id="login-email" name="email" class="w-full px-4 py-3 pl-11 bg-surface-800/50 border border-surface-700 rounded-xl text-surface-50 placeholder-surface-500 focus:outline-none transition-all" placeholder="you@example.com" autocomplete="email" required>
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-surface-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <p id="login-email-error" class="hidden mt-2 text-sm text-danger"></p>
          </div>

          <div class="input-wrapper">
            <label for="login-password" class="block text-sm font-medium text-surface-300 mb-2">Password</label>
            <div class="relative">
              <input type="password" id="login-password" name="password" class="w-full px-4 py-3 pl-11 pr-11 bg-surface-800/50 border border-surface-700 rounded-xl text-surface-50 placeholder-surface-500 focus:outline-none transition-all" placeholder="Enter your password" autocomplete="current-password" required>
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-surface-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              <button type="button" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-surface-500 hover:text-surface-300 transition-colors" data-target="login-password" aria-label="Toggle password visibility">
                <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
              </button>
            </div>
            <p id="login-password-error" class="hidden mt-2 text-sm text-danger"></p>
          </div>

          <!-- Remember me & Forgot password row -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="remember-me" class="checkbox-custom">
              <span class="text-sm text-surface-300">Remember me</span>
            </label>
            <button type="button" id="forgot-password-btn" class="text-sm text-accent hover:text-accent-light transition-colors">Forgot password?</button>
          </div>

          <button type="submit" id="login-submit" class="btn-primary w-full py-3.5 text-white font-semibold rounded-xl flex items-center justify-center gap-2">
            <span class="btn-text">Login</span>
            <svg class="btn-spinner hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          </button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="hidden space-y-5">
          <div class="input-wrapper">
            <label for="signup-name" class="block text-sm font-medium text-surface-300 mb-2">Full Name</label>
            <div class="relative">
              <input type="text" id="signup-name" name="full_name" class="w-full px-4 py-3 pl-11 bg-surface-800/50 border border-surface-700 rounded-xl text-surface-50 placeholder-surface-500 focus:outline-none transition-all" placeholder="John Doe" autocomplete="name" required>
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-surface-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <p id="signup-name-error" class="hidden mt-2 text-sm text-danger"></p>
          </div>

          <div class="input-wrapper">
            <label for="signup-email" class="block text-sm font-medium text-surface-300 mb-2">Email</label>
            <div class="relative">
              <input type="email" id="signup-email" name="email" class="w-full px-4 py-3 pl-11 bg-surface-800/50 border border-surface-700 rounded-xl text-surface-50 placeholder-surface-500 focus:outline-none transition-all" placeholder="you@example.com" autocomplete="email" required>
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-surface-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <p id="signup-email-error" class="hidden mt-2 text-sm text-danger"></p>
          </div>

          <div class="input-wrapper">
            <label for="signup-password" class="block text-sm font-medium text-surface-300 mb-2">Password</label>
            <div class="relative">
              <input type="password" id="signup-password" name="password" class="w-full px-4 py-3 pl-11 pr-11 bg-surface-800/50 border border-surface-700 rounded-xl text-surface-50 placeholder-surface-500 focus:outline-none transition-all" placeholder="Create a password" autocomplete="new-password" required minlength="8">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-surface-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              <button type="button" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-surface-500 hover:text-surface-300 transition-colors" data-target="signup-password" aria-label="Toggle password visibility">
                <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
              </button>
            </div>
            <p id="signup-password-error" class="hidden mt-2 text-sm text-danger"></p>
            <div class="mt-3">
              <div class="flex gap-1.5 mb-2">
                <div id="strength-1" class="strength-bar h-1 flex-1 rounded-full bg-surface-700"></div>
                <div id="strength-2" class="strength-bar h-1 flex-1 rounded-full bg-surface-700"></div>
                <div id="strength-3" class="strength-bar h-1 flex-1 rounded-full bg-surface-700"></div>
                <div id="strength-4" class="strength-bar h-1 flex-1 rounded-full bg-surface-700"></div>
              </div>
              <p id="strength-text" class="text-xs text-surface-500">Password strength: Enter password</p>
            </div>
          </div>

          <div class="input-wrapper">
            <label for="signup-confirm" class="block text-sm font-medium text-surface-300 mb-2">Confirm Password</label>
            <div class="relative">
              <input type="password" id="signup-confirm" name="confirmPassword" class="w-full px-4 py-3 pl-11 pr-11 bg-surface-800/50 border border-surface-700 rounded-xl text-surface-50 placeholder-surface-500 focus:outline-none transition-all" placeholder="Confirm your password" autocomplete="new-password" required>
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-surface-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
              <button type="button" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-surface-500 hover:text-surface-300 transition-colors" data-target="signup-confirm" aria-label="Toggle password visibility">
                <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
              </button>
            </div>
            <p id="signup-confirm-error" class="hidden mt-2 text-sm text-danger"></p>
          </div>

          <button type="submit" id="signup-submit" class="btn-primary w-full py-3.5 text-white font-semibold rounded-xl flex items-center justify-center gap-2">
            <span class="btn-text">Create Account</span>
            <svg class="btn-spinner hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          </button>
        </form>

        <!-- Reset Password Form -->
        <form id="reset-form" class="hidden space-y-5">
          <p class="text-surface-400 text-sm">Enter your new password below.</p>
          <div class="input-wrapper">
            <label for="reset-password" class="block text-sm font-medium text-surface-300 mb-2">New Password</label>
            <input type="password" id="reset-password" name="password" class="w-full px-4 py-3 bg-surface-800/50 border border-surface-700 rounded-xl text-surface-50 placeholder-surface-500 focus:outline-none transition-all" placeholder="Enter new password" required minlength="8">
            <p id="reset-password-error" class="hidden mt-2 text-sm text-danger"></p>
          </div>
          <div class="input-wrapper">
            <label for="reset-confirm" class="block text-sm font-medium text-surface-300 mb-2">Confirm Password</label>
            <input type="password" id="reset-confirm" name="confirmPassword" class="w-full px-4 py-3 bg-surface-800/50 border border-surface-700 rounded-xl text-surface-50 placeholder-surface-500 focus:outline-none transition-all" placeholder="Confirm new password" required>
            <p id="reset-confirm-error" class="hidden mt-2 text-sm text-danger"></p>
          </div>
          <button type="submit" id="reset-submit" class="btn-primary w-full py-3.5 text-white font-semibold rounded-xl flex items-center justify-center gap-2">
            <span class="btn-text">Update Password</span>
            <svg class="btn-spinner hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          </button>
        </form>

        <!-- NO GOOGLE BUTTON / DIVIDER - REMOVED AS REQUESTED -->
      </div>

      <!-- Footer terms (unchanged) -->
      <div class="px-6 sm:px-8 py-4 bg-surface-800/30 border-t border-surface-800 text-center">
        <p class="text-sm text-surface-500">By continuing, you agree to our <a href="#" class="text-surface-400 hover:text-accent transition-colors">Terms of Service</a> and <a href="#" class="text-surface-400 hover:text-accent transition-colors">Privacy Policy</a></p>
      </div>
    </div>

    <!-- Back to home link -->
    <div class="mt-6 text-center">
      <a href="index.html" class="inline-flex items-center gap-2 text-surface-400 hover:text-surface-200 transition-colors text-sm group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back to home
      </a>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgot-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-surface-950/80 backdrop-blur-sm" id="forgot-modal-backdrop"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="relative w-full max-w-md bg-surface-900 border border-surface-800 rounded-2xl shadow-2xl animate-fade-in">
        <div class="p-6">
          <h3 class="font-display text-xl font-semibold text-surface-50 mb-2">Reset Password</h3>
          <p class="text-surface-400 text-sm mb-6">Enter your email and we'll send you a link to reset your password.</p>
          <form id="forgot-form" class="space-y-4">
            <div class="input-wrapper">
              <label for="forgot-email" class="block text-sm font-medium text-surface-300 mb-2">Email</label>
              <input type="email" id="forgot-email" class="w-full px-4 py-3 bg-surface-800/50 border border-surface-700 rounded-xl text-surface-50 placeholder-surface-500 focus:outline-none transition-all" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn-primary w-full py-3 text-white font-semibold rounded-xl flex items-center justify-center">
              <span class="btn-text">Send Reset Link</span>
              <svg class="btn-spinner hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
          </form>
        </div>
        <button id="close-forgot-modal" class="absolute top-4 right-4 p-2 text-surface-500 hover:text-surface-200 transition-colors" aria-label="Close modal">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Main Application Script -->
  <script>
    // ============================================
    // Supabase Configuration
    // ============================================
    const SUPABASE_URL = 'https://kkblbhghqcxpopmkjtbo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYmxiaGdocWN4cG9wbWtqdGJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTQ5MDgsImV4cCI6MjA4ODczMDkwOH0.dkkEpQj0Dd9w7eFpmGGGfb1SBkNljXwJyX4hO5DMBFs';
    
    const { createClient } = window.supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================
    // DOM Elements
    // ============================================
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const tabIndicator = document.getElementById('tab-indicator');
    const authTabs = document.getElementById('auth-tabs');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const resetForm = document.getElementById('reset-form');
    const globalError = document.getElementById('global-error');
    const globalErrorText = document.getElementById('global-error-text');
    const successMessage = document.getElementById('success-message');
    const successMessageText = document.getElementById('success-message-text');
    const forgotModal = document.getElementById('forgot-modal');
    const forgotModalBackdrop = document.getElementById('forgot-modal-backdrop');
    const forgotForm = document.getElementById('forgot-form');
    const closeForgotModal = document.getElementById('close-forgot-modal');
    const forgotPasswordBtn = document.getElementById('forgot-password-btn');

    // ============================================
    // Tab Switching
    // ============================================
    function switchTab(tab) {
      hideMessages();
      
      loginForm.classList.add('hidden');
      signupForm.classList.add('hidden');
      resetForm.classList.add('hidden');
      authTabs.classList.remove('hidden');

      const isLogin = tab === 'login';
      const isSignup = tab === 'signup';
      const isReset = tab === 'reset';

      if (isReset) {
        authTabs.classList.add('hidden');
        resetForm.classList.remove('hidden');
      } else {
        tabLogin.classList.toggle('text-surface-50', isLogin);
        tabLogin.classList.toggle('text-surface-400', !isLogin);
        tabSignup.classList.toggle('text-surface-50', isSignup);
        tabSignup.classList.toggle('text-surface-400', !isSignup);
        tabIndicator.style.transform = isLogin ? 'translateX(0)' : 'translateX(100%)';
        
        if (isLogin) loginForm.classList.remove('hidden');
        if (isSignup) signupForm.classList.remove('hidden');
      }
    }

    tabLogin.addEventListener('click', () => switchTab('login'));
    tabSignup.addEventListener('click', () => switchTab('signup'));

    // ============================================
    // Password Visibility Toggle
    // ============================================
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.dataset.target;
        const input = document.getElementById(targetId);
        const eyeOpen = btn.querySelector('.eye-open');
        const eyeClosed = btn.querySelector('.eye-closed');
        if (input.type === 'password') {
          input.type = 'text';
          eyeOpen.classList.add('hidden');
          eyeClosed.classList.remove('hidden');
        } else {
          input.type = 'password';
          eyeOpen.classList.remove('hidden');
          eyeClosed.classList.add('hidden');
        }
      });
    });

    // ============================================
    // Password Strength Indicator
    // ============================================
    const signupPasswordInput = document.getElementById('signup-password');
    const strengthBars = [
      document.getElementById('strength-1'),
      document.getElementById('strength-2'),
      document.getElementById('strength-3'),
      document.getElementById('strength-4')
    ];
    const strengthText = document.getElementById('strength-text');

    function checkPasswordStrength(password) {
      let strength = 0;
      if (password.length >= 8) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/\d/.test(password)) strength++;
      if (/[^a-zA-Z\d]/.test(password)) strength++;
      return strength;
    }

    function updateStrengthIndicator(strength) {
      const colors = ['#ef4444', '#f59e0b', '#10b981', '#10b981'];
      const texts = ['Weak', 'Fair', 'Good', 'Strong'];
      const textColors = ['text-danger', 'text-warning', 'text-success', 'text-success'];
      strengthBars.forEach((bar, index) => {
        bar.style.backgroundColor = index < strength ? colors[Math.max(0, strength - 1)] : '#292524';
      });
      if (strength > 0) {
        strengthText.textContent = `Password strength: ${texts[strength - 1]}`;
        strengthText.className = `text-xs ${textColors[strength - 1]}`;
      } else {
        strengthText.textContent = 'Password strength: Enter password';
        strengthText.className = 'text-xs text-surface-500';
      }
    }

    signupPasswordInput.addEventListener('input', (e) => updateStrengthIndicator(checkPasswordStrength(e.target.value)));

    // ============================================
    // Form Validation & Helpers
    // ============================================
    function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

    function showError(elementId, message) {
      const errorEl = document.getElementById(elementId);
      const wrapper = errorEl?.closest('.input-wrapper');
      if (errorEl && wrapper) {
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
        wrapper.classList.add('error');
      }
    }

    function clearError(elementId) {
      const errorEl = document.getElementById(elementId);
      const wrapper = errorEl?.closest('.input-wrapper');
      if (errorEl && wrapper) {
        errorEl.classList.add('hidden');
        wrapper.classList.remove('error');
      }
    }

    function showGlobalError(message) {
      globalErrorText.textContent = message;
      globalError.classList.remove('hidden');
      globalError.classList.add('animate-shake');
      setTimeout(() => globalError.classList.remove('animate-shake'), 400);
    }

    function showSuccess(message) {
      successMessageText.textContent = message;
      successMessage.classList.remove('hidden');
    }

    function hideMessages() {
      globalError.classList.add('hidden');
      successMessage.classList.add('hidden');
    }

    function setLoading(button, isLoading) {
      const text = button.querySelector('.btn-text');
      const spinner = button.querySelector('.btn-spinner');
      button.disabled = isLoading;
      if (text) text.classList.toggle('hidden', isLoading);
      if (spinner) spinner.classList.toggle('hidden', !isLoading);
    }

    // ============================================
    // Login Form Handler
    // ============================================
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      let hasError = false;
      
      clearError('login-email-error');
      clearError('login-password-error');
      
      if (!email) { showError('login-email-error', 'Email is required'); hasError = true; }
      else if (!validateEmail(email)) { showError('login-email-error', 'Please enter a valid email'); hasError = true; }
      if (!password) { showError('login-password-error', 'Password is required'); hasError = true; }
      if (hasError) return;

      const submitBtn = document.getElementById('login-submit');
      setLoading(submitBtn, true);
      
      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
      } catch (error) {
        console.error('Login error:', error);
        if (error.message.includes('Invalid login credentials')) showGlobalError('Invalid email or password. Please try again.');
        else if (error.message.includes('Email not confirmed')) showGlobalError('Please check your email and confirm your account.');
        else showGlobalError(error.message || 'An error occurred. Please try again.');
      } finally { setLoading(submitBtn, false); }
    });

    // ============================================
    // Signup Form Handler
    // ============================================
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      const fullName = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirmPassword = document.getElementById('signup-confirm').value;
      let hasError = false;

      clearError('signup-name-error');
      clearError('signup-email-error');
      clearError('signup-password-error');
      clearError('signup-confirm-error');

      if (!fullName) { showError('signup-name-error', 'Full name is required'); hasError = true; }
      if (!email) { showError('signup-email-error', 'Email is required'); hasError = true; }
      else if (!validateEmail(email)) { showError('signup-email-error', 'Please enter a valid email'); hasError = true; }
      
      if (!password) { showError('signup-password-error', 'Password is required'); hasError = true; }
      else if (password.length < 8) { showError('signup-password-error', 'Password must be at least 8 characters'); hasError = true; }
      
      if (password !== confirmPassword) { showError('signup-confirm-error', 'Passwords do not match'); hasError = true; }
      if (hasError) return;

      const submitBtn = document.getElementById('signup-submit');
      setLoading(submitBtn, true);
      
      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            data: { full_name: fullName },
            emailRedirectTo: window.location.origin + '/dashboard.html'
          }
        });
        if (error) throw error;
        
        if (data.user && !data.session) {
          showSuccess('Account created! Please check your email to confirm your account.');
        } else {
          showSuccess('Account created! Redirecting...');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        }
      } catch (error) {
        console.error('Signup error:', error);
        if (error.message.includes('already registered')) showGlobalError('An account with this email already exists. Try logging in instead.');
        else showGlobalError(error.message || 'An error occurred. Please try again.');
      } finally { setLoading(submitBtn, false); }
    });

    // ============================================
    // Reset Password Form Handler
    // ============================================
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      const password = document.getElementById('reset-password').value;
      const confirmPassword = document.getElementById('reset-confirm').value;
      let hasError = false;

      clearError('reset-password-error');
      clearError('reset-confirm-error');

      if (password.length < 8) { showError('reset-password-error', 'Password must be at least 8 characters'); hasError = true; }
      if (password !== confirmPassword) { showError('reset-confirm-error', 'Passwords do not match'); hasError = true; }

      if (hasError) return;

      const submitBtn = document.getElementById('reset-submit');
      setLoading(submitBtn, true);

      try {
        const { error } = await supabaseClient.auth.updateUser({ password: password });
        if (error) throw error;
        showSuccess('Password updated successfully! Redirecting to login...');
        await supabaseClient.auth.signOut();
        setTimeout(() => { 
          switchTab('login'); 
          document.getElementById('reset-password').value = '';
          document.getElementById('reset-confirm').value = '';
        }, 2000);
      } catch (error) {
        console.error('Reset error:', error);
        showGlobalError(error.message || 'Failed to update password.');
      } finally { setLoading(submitBtn, false); }
    });

    // ============================================
    // Forgot Password Modal
    // ============================================
    function openForgotModal() {
      forgotModal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      document.getElementById('forgot-email').focus();
    }
    function closeForgotModalFn() {
      forgotModal.classList.add('hidden');
      document.body.style.overflow = '';
      forgotForm.reset();
    }
    forgotPasswordBtn.addEventListener('click', openForgotModal);
    closeForgotModal.addEventListener('click', closeForgotModalFn);
    forgotModalBackdrop.addEventListener('click', closeForgotModalFn);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !forgotModal.classList.contains('hidden')) closeForgotModalFn();
    });

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      if (!email || !validateEmail(email)) return;
      const submitBtn = forgotForm.querySelector('button[type="submit"]');
      setLoading(submitBtn, true);
      try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + window.location.pathname });
        if (error) throw error;
        closeForgotModalFn();
        showSuccess('If an account exists with that email, you will receive a password reset link.');
      } catch (error) {
        console.error('Reset error:', error);
        showGlobalError('An error occurred. Please try again.');
      } finally { setLoading(submitBtn, false); }
    });

    // ============================================
    // Auth State & Session Check
    // ============================================
    supabaseClient.auth.onAuthStateChange((event, session) => {
      console.log(`Auth Event: ${event}`);
      
      if (event === 'PASSWORD_RECOVERY') {
        showSuccess('You can now set a new password.');
        switchTab('reset');
      }
      
      if (event === 'SIGNED_IN') {
        const isResetView = !resetForm.classList.contains('hidden');
        if (!isResetView && window.location.pathname.includes('login')) {
          window.location.href = 'dashboard.html';
        }
      }
      
      if (event === 'INITIAL_SESSION') {
        if (session) {
          window.location.href = 'dashboard.html';
        }
      }
    });

    // Initial URL param check
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('tab') === 'signup') switchTab('signup');
    });
  </script>
</body>
</html>
